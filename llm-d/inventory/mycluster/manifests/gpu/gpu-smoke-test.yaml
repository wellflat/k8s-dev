apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke-test
spec:
  runtimeClassName: nvidia
  nodeSelector:
    nvidia.com/gpu: "true"
  restartPolicy: Never
  containers:
    - name: test
      image: nvidia/cuda:12.6.0-base-ubuntu22.04
      command:
        - nvidia-smi
        - -L
      resources:
        limits:
          nvidia.com/gpu: 1
