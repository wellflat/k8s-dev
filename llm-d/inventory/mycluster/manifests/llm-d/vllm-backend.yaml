apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-backend
  namespace: llm-d-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-backend
  template:
    metadata:
      labels:
        app: vllm-backend
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu: "true"
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: vllm-hf-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          command:
            - /bin/sh
            - -lc
          args:
            - >
              vllm serve google/gemma-4-31b-it
              --host 0.0.0.0
              --port 8000
              --trust-remote-code
              --tensor-parallel-size 2
              --quantization awq
              --gpu-memory-utilization 0.90
              --max-model-len 32768
              --max-num-seqs 32
              --max-paddings 2048
              --async-scheduling
              --enforce-eager
              --reasoning-parser gemma4
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "2"
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "2"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 360
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-backend
  namespace: llm-d-system
spec:
  type: NodePort
  selector:
    app: vllm-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
